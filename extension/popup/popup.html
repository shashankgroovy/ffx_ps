<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span>Switch Profile</span>
    <button id="theme-toggle" class="theme-toggle" title="Change theme">
      <svg viewBox="0 0 16 16" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="8" cy="4.5" r="1.2" fill="currentColor"/>
        <circle cx="4.5" cy="8" r="1.2" fill="currentColor"/>
        <circle cx="11.5" cy="8" r="1.2" fill="currentColor"/>
        <circle cx="6" cy="11.5" r="1.2" fill="currentColor"/>
        <circle cx="10" cy="11.5" r="1.2" fill="currentColor"/>
      </svg>
    </button>
  </div>
  <div id="profile-list" class="profile-list">
    <div class="loading">Loading profiles...</div>
  </div>
  <div id="empty-state" class="empty-state" hidden></div>
  <div id="create-section" class="create-section">
    <button id="create-btn" class="create-btn">+ New Profile</button>
    <div id="create-form" class="create-form" hidden>
      <input id="create-input" class="create-input" type="text" placeholder="Profile name" maxlength="64" />
      <div class="create-actions">
        <button id="create-submit" class="create-submit">Create</button>
        <button id="create-cancel" class="create-cancel">Cancel</button>
      </div>
    </div>
  </div>
  <div id="error" class="error" hidden></div>
  <div class="footer">
    <a id="manage-link" class="manage-link" href="#">Manage Profiles</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
